<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Collection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <div class="controls">
            <button id="prevBtn" class="nav-btn">← Previous</button>
            <h2 id="gameTitle">Flappy Bird</h2>
            <button id="nextBtn" class="nav-btn">Next →</button>
        </div>
        
        <div class="container">
            <canvas id="gameCanvas" width="320" height="480"></canvas>
            <div class="overlay" id="overlay">
                <div class="menu">
                    <h1 id="menuTitle">Flappy Bird</h1>
                    <button id="startBtn" class="btn">Start Game</button>
                    <button id="restartBtn" class="btn" style="display: none;">Restart Game</button>
                    <p id="score" class="score">Score: 0</p>
                    <p id="gameOverText" class="game-over" style="display: none;">Game Over!</p>
                </div>
            </div>
        </div>
    </div>

    <script src="games.js"></script>
</body>
</html>
